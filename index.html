<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>神のお告げ - お散歩ジェネレーター</title>
    <meta name="description" content="いつもの散歩を楽しくする、ランダムお散歩目的ジェネレーター。">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;800&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=10">
</head>

<body>
    <div class="sky-background">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>

    <div class="app-container">
        <header>
            <h1>神のお告げ</h1>
            <p>〜今日のお告げ〜</p>
        </header>

        <main class="generator-area">
            <div class="result-card" id="where-card">
                <span class="label">どこで</span>
                <div class="roulette-window">
                    <span id="where-text" class="result-text">？？？</span>
                </div>
            </div>

            <div class="result-card" id="what-card">
                <span class="label">なにをする</span>
                <div class="roulette-window">
                    <span id="what-text" class="result-text">？？？</span>
                </div>
            </div>
        </main>

        <div class="controls">
            <button id="action-btn" class="btn start-btn">
                <span class="btn-text">スタート！</span>
            </button>
        </div>
    </div>

    <div class="grass-foreground"></div>

    <script src="script.js"></script>
</body>

</html>
